<!DOCTYPE html>
<html>
<head>
  <title>Register Donor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🩸 BloodLink</a>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-danger mb-4">Donor Registration</h2>
  <form method="POST" action="/register">
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="col-md-3 mb-3">
        <label>Age</label>
        <input type="number" name="age" class="form-control" min="18" required>
      </div>
      <div class="col-md-3 mb-3">
        <label>Gender</label>
        <select name="gender" class="form-select" required>
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Weight (kg)</label>
        <input type="number" name="weight" class="form-control" min="45" required>
      </div>
      <div class="col-md-4 mb-3">
        <label>Blood Group</label>
        <select name="blood_group" class="form-select" required>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label>City</label>
        <input type="text" name="city" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Any Disease in Last 3 Months?</label>
      <textarea name="disease_history" class="form-control" placeholder="Enter if any, otherwise type 'None'" rows="2"></textarea>
    </div>

    <div class="mb-3">
      <label>Any Active Medicine Intake?</label>
      <textarea name="medicines" class="form-control" placeholder="List medicine names, or 'None'" rows="2"></textarea>
    </div>

    <div class="mb-3">
      <label>Last Donation Date</label>
      <input type="date" name="last_donation" class="form-control">
    </div>

    <button type="submit" class="btn btn-danger">Submit</button>
  </form>
</div>
</body>
</html>
