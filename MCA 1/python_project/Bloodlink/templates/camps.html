<!DOCTYPE html>
<html>
<head>
  <title>Blood Camps</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🩸 BloodLink</a>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-danger mb-4">Upcoming Blood Donation Camps</h2>
  <table class="table table-bordered table-hover">
    <thead class="table-danger">
      <tr>
        <th>Name</th>
        <th>City</th>
        <th>Date</th>
        <th>Address</th>
        <th>Map</th>
      </tr>
    </thead>
    <tbody>
      {% for camp in camps %}
      <tr>
        <td>{{ camp.name }}</td>
        <td>{{ camp.city }}</td>
        <td>{{ camp.date }}</td>
        <td>{{ camp.address }}</td>
        <td>
          <a href="https://www.google.com/maps/search/?api=1&query={{ camp.latitude }},{{ camp.longitude }}" 
             target="_blank" class="btn btn-sm btn-outline-danger">View</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>
