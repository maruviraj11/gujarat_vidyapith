<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authentication System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #d21c2b 0%, #edeaef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            background: rgb(241, 237, 237);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(207, 181, 239, 0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 12px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #0c0e17;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7d8ac5 0%, #9f66d7 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 5px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a466d 0%, #667eea 100%);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-weight: 700;
            font-size: 28px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .errorlist {
            list-style: none;
            padding: 0;
            color: #dc3545;
            font-size: 13px;
        }

        .errorlist li {
            margin-bottom: 5px;
        }

        .input-group {
            display: flex;
        }

        .input-group .form-control {
            flex: 1;
            border-radius: 5px 0 0 5px;
        }

        .input-group .btn {
            border-radius: 0 5px 5px 0;
            border: 1px solid #ddd;
            border-left: none;
            padding: 12px 15px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-group .btn:hover {
            background-color: #f8f9fa;
            color: #667eea;
        }

        .input-group .btn i {
            font-size: 16px;
        }

        ul.errorlist+input,
        ul.errorlist+textarea {
            border-color: #dc3545 !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="auth-container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
